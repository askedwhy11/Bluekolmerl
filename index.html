<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fermentación Natural</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap');
    
    body {
      margin: 0; padding: 0;
      font-family: 'Inter', sans-serif;
      background: #0a1f14;
      color: #f5f0e6;
    }
    
    .container {
      width: 100%; max-width: 430px; margin: 0 auto; min-height: 100vh;
      background: linear-gradient(rgba(10,31,20,0.88), rgba(10,31,20,0.95)), url('fondo.jpeg') center/cover no-repeat;
      position: relative; display: flex; flex-direction: column; overflow: hidden;
    }
    
    .header { padding: 25px 25px 15px; text-align: center; }
    
    .main-title {
      font-family: 'Playfair Display', serif; font-size: 46px; font-weight: 700;
      line-height: 1.05; color: #d4b88a; text-shadow: 0 3px 15px rgba(0,0,0,0.7); margin: 0;
    }
    
    .hero { flex: 1; position: relative; padding: 0 25px 25px; display: flex; align-items: center; justify-content: center; }
    
    .yogurt-bg {
      position: absolute; inset: 0;
      background: url('yogurt.jpeg') center/cover no-repeat;
      opacity: 0.78; z-index: 1;
    }
    
    .author-box {
      position: relative; z-index: 2; background: rgba(10,31,20,0.85);
      padding: 20px 24px; border-radius: 24px; backdrop-filter: blur(10px);
      border: 1px solid rgba(212,184,138,0.38); display: flex; align-items: center; gap: 20px;
    }
    .author-box img { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; border: 3px solid #d4b88a; }
    .quote { font-style: italic; font-size: 16.5px; line-height: 1.4; color: #e8d9c0; margin: 0; }
    
    .content { padding: 0 28px 30px; position: relative; z-index: 2; }
    .benefits { list-style: none; padding: 0; margin: 15px 0 35px; }
    .benefits li { margin: 16px 0; padding-left: 32px; position: relative; font-size: 15.8px; color: #d4d0c7; }
    .benefits li:before { content: '✧'; position: absolute; left: 0; color: #d4b88a; font-size: 19px; }
    
    /* Banner GIF burbujas */
    .cta-banner {
      margin: 15px 28px 45px; height: 130px;
      background: linear-gradient(rgba(10,31,20,0.48), rgba(10,31,20,0.72)), url('burbujas.gif') center/cover no-repeat;
      border-radius: 30px; position: relative; overflow: hidden; cursor: pointer;
      box-shadow: 0 14px 45px rgba(212,184,138,0.52);
      display: flex; align-items: center; justify-content: center; text-align: center;
      transition: all 0.4s ease;
    }
    .cta-banner:hover { transform: scale(1.025); }
    
    .cta-banner::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 40% 50%, rgba(255,235,170,0.45) 12%, transparent 60%);
      animation: brilloEtereo 22s ease-in-out infinite alternate;
      pointer-events: none; mix-blend-mode: screen; opacity: 0.75;
    }
    @keyframes brilloEtereo {
      0% { opacity: 0.45; transform: scale(0.96); }
      100% { opacity: 0.78; transform: scale(1.04); }
    }
    
    .cta-text {
      color: #fff; font-family: 'Playfair Display', serif; font-size: 19.8px; font-weight: 700;
      text-shadow: 0 4px 20px rgba(0,0,0,0.88); line-height: 1.22; z-index: 3; position: relative;
    }
    .cta-text span { display: block; font-size: 15.4px; font-weight: 400; margin-top: 6px; opacity: 0.96; }
    
    /* Ginkgo como lazo elegante al pie */
    .ginkgos {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 92px;
      background: url('hojas.jpeg') repeat-x bottom;
      background-size: auto 100%;
      opacity: 0.94;
      z-index: 1;
      pointer-events: none;
    }
    
    .garabato {
      position: absolute; 
      bottom: 78px; 
      left: 0; right: 0;
      height: 60px;
      background: url('garabato.png') center no-repeat;
      background-size: contain;
      opacity: 0.29;
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="main-title">Fermentación Natural</h1>
    </div>
    
    <div class="hero">
      <div class="yogurt-bg"></div>
      <div class="author-box">
        <img src="mifoto.jpeg" alt="Autora">
        <p class="quote">"Fermentar es fácil y tu cuerpo lo nota"</p>
      </div>
    </div>
    
    <div class="content">
      <ul class="benefits">
        <li>Guía para elegir tu fermentadora ideal</li>
        <li>La clave de tu energía diaria: salud intestinal y recetas vivas</li>
        <li>Recetas de perfumes naturales sin tóxicos</li>
      </ul>
      
      <div class="cta-banner" onclick="alert('¡Aquí iría el vídeo de la fermentadora viva! ✨')">
        <div class="cta-text">
          Mira cómo funciona<br>
          <span>la fermentadora en un minuto</span>
        </div>
      </div>
    </div>
    
    <div class="garabato"></div>
    <div class="ginkgos"></div>
  </div>
</body>
</html>
